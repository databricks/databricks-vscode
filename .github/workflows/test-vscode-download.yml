name: Test VSCode Download (throwaway)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test-vscode-download:
    name: Test VSCode download on hardened runner
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Test 1 - curl VS Code releases API
        run: |
          echo "=== Testing update.code.visualstudio.com API ==="
          curl -sSL --max-time 30 \
            "https://update.code.visualstudio.com/api/releases/stable" \
            -o /tmp/vscode-versions.json && \
            echo "SUCCESS: API reachable" && \
            head -c 200 /tmp/vscode-versions.json || \
            echo "FAILED: API unreachable (exit code: $?)"

      - name: Test 2 - curl VS Code download (follow redirects)
        run: |
          echo "=== Testing VS Code binary download ==="
          curl -sSL --max-time 60 \
            "https://update.code.visualstudio.com/latest/linux-x64/stable" \
            -o /tmp/vscode-test.tar.gz -w "HTTP status: %{http_code}\nRedirect URL: %{redirect_url}\nEffective URL: %{url_effective}\n" && \
            echo "SUCCESS: Download worked ($(du -h /tmp/vscode-test.tar.gz | cut -f1))" || \
            echo "FAILED: Download blocked (exit code: $?)"

      - name: Test 3 - curl VS Code CDN directly
        run: |
          echo "=== Testing vscode.download.prss.microsoft.com ==="
          curl -sSL --max-time 30 \
            "https://vscode.download.prss.microsoft.com" \
            -o /dev/null -w "HTTP status: %{http_code}\n" || \
            echo "FAILED: CDN unreachable (exit code: $?)"

      - name: Test 4 - Node.js https.get (same as @vscode/test-electron)
        run: |
          echo "=== Testing Node.js https.get to VS Code API ==="
          node -e "
            const https = require('https');
            const url = 'https://update.code.visualstudio.com/api/releases/stable';
            console.log('Requesting:', url);
            const req = https.get(url, (res) => {
              console.log('Status:', res.statusCode);
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => {
                console.log('Response length:', data.length);
                console.log('First 200 chars:', data.substring(0, 200));
                process.exit(0);
              });
            });
            req.on('error', (e) => {
              console.error('FAILED:', e.message);
              process.exit(1);
            });
            req.setTimeout(30000, () => {
              console.error('FAILED: timeout');
              req.destroy();
              process.exit(1);
            });
          "

      - name: Test 5 - github.com release download (for comparison)
        run: |
          echo "=== Testing github.com direct curl (for comparison) ==="
          curl -sSL --max-time 30 \
            "https://github.com/databricks/cli/releases/download/v0.295.0/databricks_cli_0.295.0_SHA256SUMS" \
            -o /tmp/sha256sums -w "HTTP status: %{http_code}\n" && \
            echo "SUCCESS: github.com reachable" && \
            head -5 /tmp/sha256sums || \
            echo "FAILED: github.com blocked (exit code: $?)"
